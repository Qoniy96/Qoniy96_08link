<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Nmail</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box { 
            width: 450px; margin: 100px auto; padding: 40px; 
            border: 1px solid #dadce0; border-radius: 8px; text-align: center; 
        }
        .input-field { width: 100%; padding: 13px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; }
        .suffix { display: block; text-align: right; color: #70757a; font-size: 13px; margin-top: -35px; margin-right: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-text" style="font-size: 35px;">
            <span class="blue">W</span>ivne <span style="color:#5f6368; font-weight: normal;">Nmail</span>
        </div>
        <h2 style="margin: 20px 0; font-weight: 400;">Đăng nhập</h2>
        <p>Sử dụng tài khoản @qoniymail.com</p>
        
        <form action="nmail.html" method="GET" style="text-align: left; margin-top: 30px;">
            <input type="text" class="input-field" placeholder="Tên người dùng" required>
            <span class="suffix">@qoniymail.com</span>
            <input type="password" class="input-field" placeholder="Mật khẩu" required>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px;">
                <a href="#" style="color:#1a73e8; text-decoration:none; font-weight:bold;">Tạo tài khoản</a>
                <button type="submit" class="btn-login" style="border:none; cursor:pointer;">Tiếp theo</button>
            </div>
        </form>
    </div>
</body>
</html>
