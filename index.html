<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wivne Search</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <!-- Thay đổi từ Gmail thành Nmail -->
            <a href="#" class="nav-link">Nmail</a>
            <a href="#" class="nav-link">Hình ảnh</a>
            <div class="apps-icon">
                <svg viewBox="0 0 24 24"><path d="M6,8c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,8,6,8z M12,20c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,20,12,20z M6,20 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,20,6,20z M6,14c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S4.9,14,6,14z M12,14 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,14,12,14z M16,6c0,1.1,0.9,2,2,2s2-0.9,2-2s-0.9-2-2-2S16,4.9,16,6z M12,8 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S10.9,8,12,8z M18,14c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S16.9,14,18,14z M18,20 c1.1,0,2-0.9,2-2s-0.9-2-2-2s-2,0.9-2,2S16.9,20,18,20z"></path></svg>
            </div>
            <button class="btn-signin">Đăng nhập</button>
        </nav>
    </header>

    <main class="search-container">
        <!-- Logo Wivne với hiệu ứng màu sắc -->
        <div class="logo">
            <span class="color-blue">W</span><span class="color-red">i</span><span class="color-yellow">v</span><span class="color-green">n</span><span class="color-red tilt">e</span>
        </div>
        
        <form action="https://www.google.com/search" method="GET" class="search-form">
            <div class="search-input-area">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                </div>
                <input type="text" name="q" autocomplete="off" placeholder="Tìm kiếm trên Wivne...">
                <div class="mic-icon">
                    <svg viewBox="0 0 24 24"><path fill="#4285f4" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path><path fill="#34a853" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path></svg>
                </div>
            </div>
            <div class="buttons">
                <button type="submit">Tìm với Wivne</button>
                <button type="button">Trang web ngẫu nhiên</button>
            </div>
        </form>

        <p class="language-info">Dịch vụ của Wivne có sẵn bằng: <a href="#">English</a> <a href="#">Français</a></p>
    </main>

    <footer>
        <div class="footer-row-1">Việt Nam</div>
        <div class="footer-row-2">
            <div class="f-links">
                <a href="#">Giới thiệu</a>
                <a href="#">Quảng cáo</a>
                <a href="#">Doanh nghiệp</a>
                <a href="#">Cách hoạt động của Wivne</a>
            </div>
            <div class="f-links">
                <a href="#">Quyền riêng tư</a>
                <a href="#">Điều khoản</a>
                <a href="#">Cài đặt</a>
            </div>
        </div>
    </footer>
</body>
</html>
